<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>入館管理システム | Visitor Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Kaisei+Opti:wght@400;700&family=Caveat:wght@400;600;700&family=Klee+One:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== TOKENS ===== */
    :root {
      --bg:         #fefaf6;
      --bg-alt:     #faf4ef;
      --card:       #ffffff;
      --border:     #f0c8c8;
      --border-soft:#e8ddd6;
      --text-main:  #4a4040;
      --text-sub:   #8a7060;
      --text-hint:  #b8a898;
      --accent:     #7a5c3a;
      --yellow:     #f5c842;
      --yellow-d:   #d4a820;
      --blue:       #9ed8e8;
      --blue-d:     #5ab0c8;
      --pink:       #f5a7a5;
      --pink-d:     #d97270;
      --green:      #a2d6ca;
      --green-d:    #5aaba0;
      --white:      #ffffff;
      --shadow-lg:  0 10px 30px -5px rgba(122,92,58,0.12);
      --shadow-sm:  0 2px 8px rgba(122,92,58,0.06);
      --radius-lg:  28px;
      --radius-md:  18px;
    }

    /* ===== BASE ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Klee One', 'Kaisei Opti', sans-serif;
      background: var(--bg);
      color: var(--text-main);
      line-height: 1.6;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
    }

    /* ===== LAYOUT ===== */
    .screen { display: none; max-width: 500px; margin: 0 auto; padding: 24px 20px 100px; animation: slideIn 0.5s cubic-bezier(0.16, 1, 0.3, 1); }
    .screen.active { display: block; }
    .screen-wide { max-width: 780px; }
    
    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .banner {
      background: var(--bg-alt); color: var(--text-sub);
      padding: 10px 16px; text-align: center; font-size: 11px;
      border-bottom: 1px solid var(--border-soft);
      position: sticky; top: 0; z-index: 1000; backdrop-filter: blur(8px);
    }
    .banner.sync { background: #f0f9f5; color: var(--green-d); border-color: var(--green); }

    /* ===== COMPONENTS ===== */
    .card {
      background: var(--card); border-radius: var(--radius-lg);
      padding: 30px 24px; border: 1.5px solid var(--border);
      box-shadow: var(--shadow-lg); margin-bottom: 24px;
      position: relative; overflow: hidden;
    }
    .card::before { content: ""; position: absolute; top: 0; left: 0; width: 6px; height: 100%; background: transparent; }
    .card-yellow { border-color: #f5e090; }
    .card-yellow::before { background: var(--yellow); }
    .card-blue { border-color: #c8eaf5; }
    .card-blue::before { background: var(--blue); }

    /* BUTTONS */
    button { cursor: pointer; border: none; font-family: inherit; font-weight: 600; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    .btn { 
      border-radius: 99px; padding: 16px 32px; font-size: 16px; 
      width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-yellow { background: var(--yellow); color: #5a4010; border: 2px solid var(--yellow-d); }
    .btn-blue { background: var(--blue); color: #1a4a5a; border: 2px solid var(--blue-d); }
    .btn-ghost { background: transparent; color: var(--text-sub); border: 1.5px solid var(--border-soft); border-radius: 99px; padding: 10px 24px; }
    
    /* INPUTS */
    .input-group { margin-bottom: 24px; }
    .label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 8px; color: var(--text-sub); }
    input {
      width: 100%; padding: 16px; border-radius: var(--radius-md);
      border: 1.5px solid var(--border-soft); background: var(--bg);
      font-size: 16px; font-family: inherit; transition: all 0.2s;
    }
    input:focus { border-color: var(--blue-d); outline: none; background: #fff; box-shadow: 0 0 0 4px rgba(158,216,232,0.2); }

    /* CONDITION PICKER */
    .cond-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
    .cond-option {
      padding: 16px 8px; border-radius: var(--radius-md); border: 1.5px solid var(--border-soft);
      background: var(--white); display: flex; flex-direction: column; align-items: center; gap: 4px;
      opacity: 0.6; filter: grayscale(1);
    }
    .cond-option.active { opacity: 1; filter: grayscale(0); border-width: 2px; }
    .cond-option.good.active { background: #f0fdf8; border-color: var(--green-d); color: var(--green-d); }
    .cond-option.normal.active { background: #f0faff; border-color: var(--blue-d); color: var(--blue-d); }
    .cond-option.bad.active { background: #fff0f0; border-color: var(--pink-d); color: var(--pink-d); }
    .cond-option .emoji { font-size: 28px; }

    /* STATS */
    .stat-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-bottom: 24px; }
    .stat-card { background: white; padding: 20px 10px; border-radius: 20px; border: 1.5px solid var(--border-soft); text-align: center; }
    .stat-val { font-family: 'Caveat', cursive; font-size: 32px; line-height: 1; font-weight: 700; margin-bottom: 4px; }
    .stat-label { font-size: 11px; color: var(--text-hint); font-weight: 600; }

    /* LOGS */
    .log-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 18px; background: white; border-radius: 18px;
      margin-bottom: 12px; border: 1.5px solid var(--border-soft);
    }
    .avatar {
      width: 40px; height: 40px; border-radius: 50%; background: var(--bg-alt);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Caveat', cursive; font-size: 18px; font-weight: 700; color: var(--accent);
      border: 1.5px solid var(--border-soft);
    }

    /* UTILS */
    .text-center { text-align: center; }
    .mt-4 { margin-top: 16px; }
    .tag { font-size: 11px; padding: 2px 10px; border-radius: 99px; font-weight: 700; border: 1px solid currentColor; }

    /* LOADER */
    .loader {
      border: 3px solid var(--border-soft); border-top: 3px solid var(--accent);
      border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite;
      display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div class="banner" id="js-banner">
    △ デモモード：ブラウザ内に保存されます
  </div>

  <!-- HOME SCREEN -->
  <div class="screen active" id="s-home">
    <div class="text-center" style="margin: 40px 0;">
      <svg width="60" height="60" viewBox="0 0 64 64" fill="none">
        <path d="M32 8 C20 14, 10 26, 14 40 C18 54, 34 58, 42 48 C50 38, 48 20, 32 8Z" stroke="#a2d6ca" stroke-width="2" fill="#e8f6f3"/>
        <path d="M32 8 C32 8, 30 28, 20 44" stroke="#7a5c3a" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h1 style="font-family:'Kaisei Opti'; font-size: 28px; margin-top:12px;">入館管理システム</h1>
      <p style="font-family:'Caveat'; color:var(--text-hint); font-size:18px;">Welcome & Harmony</p>
    </div>

    <div class="card card-yellow">
      <div style="display:flex; justify-content:center; margin-bottom:24px;">
        <div id="qrcode-container" style="padding:12px; background:white; border-radius:20px; border:1px solid #eee;">
          <img id="js-qr-img" src="" style="width:180px; height:180px; display:block;" alt="Scan me" />
        </div>
      </div>
      <p class="text-center" style="font-size:12px; color:var(--text-sub); margin-bottom:20px;">
        このQRコードをスキャンして入館登録を行ってください
      </p>
      <button class="btn btn-yellow" onclick="navigateTo('s-checkin')">
        <span>🖋️ 入館フォームを開く</span>
      </button>
    </div>

    <div class="text-center">
      <button class="btn-ghost" onclick="navigateTo('s-login')">管理者ログイン</button>
    </div>
  </div>

  <!-- CHECK-IN SCREEN -->
  <div class="screen" id="s-checkin">
    <div class="text-center" style="margin-bottom:32px;">
      <span style="font-size:40px;">👋</span>
      <h2 style="font-family:'Kaisei Opti';">入館のご登録</h2>
      <p id="js-current-time" style="font-size:13px; color:var(--text-hint);"></p>
    </div>

    <div class="card">
      <div class="input-group">
        <label class="label">お名前</label>
        <input type="text" id="js-input-name" placeholder="例：山田 太郎" maxlength="20">
      </div>

      <div class="input-group">
        <label class="label">今日の体調はいかがですか？</label>
        <div class="cond-picker">
          <div class="cond-option good active" onclick="selectCondition('good')" id="cond-good">
            <span class="emoji">😊</span><span style="font-size:12px;">良い</span>
          </div>
          <div class="cond-option normal" onclick="selectCondition('normal')" id="cond-normal">
            <span class="emoji">😐</span><span style="font-size:12px;">普通</span>
          </div>
          <div class="cond-option bad" onclick="selectCondition('bad')" id="cond-bad">
            <span class="emoji">😞</span><span style="font-size:12px;">悪い</span>
          </div>
        </div>
      </div>

      <button class="btn btn-yellow" id="js-btn-submit" onclick="handleCheckin()">
        <div class="loader" id="js-loader"></div>
        <span id="js-btn-text">入館を記録する</span>
      </button>
    </div>

    <div class="text-center">
      <button class="btn-ghost" onclick="navigateTo('s-home')">戻る</button>
    </div>
  </div>

  <!-- DONE SCREEN -->
  <div class="screen" id="s-done">
    <div class="card text-center" style="padding:60px 24px;">
      <span style="font-size:64px; display:block; margin-bottom:20px;">✨</span>
      <h2 style="font-family:'Kaisei Opti'; color:var(--green-d);">登録が完了しました</h2>
      <p id="js-done-msg" style="margin:16px 0; font-weight:600;"></p>
      <p style="color:var(--text-hint); font-size:14px;">今日も良い一日になりますように。🌿</p>
      
      <button class="btn btn-blue mt-4" style="margin-top:40px;" onclick="navigateTo('s-home')">トップへ戻る</button>
    </div>
  </div>

  <!-- LOGIN SCREEN -->
  <div class="screen" id="s-login">
    <div class="text-center" style="margin-bottom:32px;">
      <span style="font-size:40px;">🔑</span>
      <h2 style="font-family:'Kaisei Opti';">管理者認証</h2>
    </div>
    <div class="card">
      <div class="input-group">
        <label class="label">パスワード</label>
        <input type="password" id="js-input-pass" placeholder="••••••••">
      </div>
      <button class="btn btn-blue" onclick="handleLogin()">ログイン</button>
    </div>
    <div class="text-center">
      <button class="btn-ghost" onclick="navigateTo('s-home')">戻る</button>
    </div>
  </div>

  <!-- ADMIN DASHBOARD -->
  <div class="screen screen-wide" id="s-admin">
    <div style="display:flex; justify-content:space-between; align-items:flex-end; margin-bottom:24px;">
      <div>
        <h2 style="font-family:'Kaisei Opti';">管理ダッシュボード</h2>
        <p style="font-size:12px; color:var(--text-hint);">データの確認と管理が行えます</p>
      </div>
      <button class="btn-ghost" style="padding:6px 16px; font-size:12px;" onclick="handleLogout()">ログアウト</button>
    </div>

    <div class="stat-row">
      <div class="stat-card">
        <div class="stat-val" id="js-stat-today" style="color:var(--yellow-d);">0</div>
        <div class="stat-label">今日の入館</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="js-stat-total" style="color:var(--blue-d);">0</div>
        <div class="stat-label">累計人数</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" id="js-stat-unique" style="color:var(--accent);">0</div>
        <div class="stat-label">登録者数</div>
      </div>
    </div>

    <div class="card">
      <h3 style="font-size:14px; margin-bottom:16px; display:flex; align-items:center; gap:8px;">
        📋 最近の来館者
        <span style="font-size:10px; font-weight:normal; background:var(--bg-alt); padding:2px 8px; border-radius:4px;">自動更新</span>
      </h3>
      <div id="js-log-list">
        <!-- Logs injected here -->
      </div>
    </div>
  </div>

  <script>
    /**
     * CONFIG & STATE
     */
    const CONFIG = {
      GAS_URL: "", // スプレッドシート連携時にURLを入力
      ADMIN_PASS: "admin1234",
      QR_COLOR: "7a5c3a",
      QR_BG: "ffffff"
    };

    let state = {
      currentCondition: 'good',
      logs: JSON.parse(localStorage.getItem('vms_logs') || '[]'),
      isSubmitting: false
    };

    /**
     * DOM HELPERS
     */
    const $ = id => document.getElementById(id);
    const render = (id, html) => $(id).innerHTML = html;

    /**
     * CORE LOGIC
     */
    function init() {
      // QRコード生成
      const currentUrl = window.location.href.split('?')[0];
      const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=${encodeURIComponent(currentUrl)}&color=${CONFIG.QR_COLOR}&bgcolor=${CONFIG.QR_BG}`;
      $('js-qr-img').src = qrUrl;

      // URLパラメータチェック
      const params = new URLSearchParams(window.location.search);
      if (params.get('mode') === 'checkin') navigateTo('s-checkin');

      // 時刻更新
      setInterval(() => {
        const now = new Date();
        $('js-current-time').textContent = now.toLocaleString('ja-JP', { dateStyle: 'medium', timeStyle: 'short' });
      }, 1000);
    }

    function navigateTo(screenId) {
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      $(screenId).classList.add('active');
      window.scrollTo(0, 0);

      if (screenId === 's-admin') refreshAdminData();
    }

    function selectCondition(val) {
      state.currentCondition = val;
      document.querySelectorAll('.cond-option').forEach(opt => opt.classList.remove('active'));
      $(`cond-${val}`).classList.add('active');
    }

    async function handleCheckin() {
      const name = $('js-input-name').value.trim();
      if (!name) return alert('お名前を入力してください');
      if (state.isSubmitting) return;

      setLoading(true);

      const entry = {
        id: Date.now(),
        name: name,
        condition: state.currentCondition,
        timestamp: new Date().toLocaleString('ja-JP'),
        date: new Date().toLocaleDateString('ja-JP')
      };

      // シミュレーション遅延
      await new Promise(r => setTimeout(r, 1000));

      // データの保存
      state.logs.unshift(entry);
      CONFIG.GAS_https://script.google.com/macros/library/d/1kZXAC_V9-i3cEpj-lcmGjoFMlGuz2jSVvZpgz24FzWzusGyFxFanuPxD/2('vms_logs', JSON.stringify(state.logs));

      $('js-done-msg').textContent = `${name} 様`;
      setLoading(false);
      navigateTo('s-done');
      
      // 入力リセット
      $('js-input-name').value = '';
      selectCondition('good');
    }

    function setLoading(val) {
      state.isSubmitting = val;
      $('js-loader').style.display = val ? 'block' : 'none';
      $('js-btn-text').style.display = val ? 'none' : 'block';
      $('js-btn-submit').disabled = val;
    }

    function handleLogin() {
      const pass = $('js-input-pass').value;
      if (pass === CONFIG.ADMIN_PASS) {
        $('js-input-pass').value = '';
        navigateTo('s-admin');
      } else {
        alert('パスワードが正しくありません');
      }
    }

    function handleLogout() {
      navigateTo('s-home');
    }

    function refreshAdminData() {
      const today = new Date().toLocaleDateString('ja-JP');
      const todayLogs = state.logs.filter(l => l.date === today);
      const uniqueNames = new Set(state.logs.map(l => l.name));

      $('js-stat-today').textContent = todayLogs.length;
      $('js-stat-total').textContent = state.logs.length;
      $('js-stat-unique').textContent = uniqueNames.size;

      const logHtml = state.logs.length === 0 
        ? '<p style="text-align:center; padding:40px; color:var(--text-hint);">履歴がありません</p>'
        : state.logs.slice(0, 20).map(log => `
          <div class="log-row">
            <div style="display:flex; align-items:center; gap:12px;">
              <div class="avatar">${log.name[0]}</div>
              <div>
                <div style="font-weight:600; font-size:14px;">${log.name}</div>
                <div style="font-size:11px; color:var(--text-hint);">${log.timestamp}</div>
              </div>
            </div>
            <div>
              ${getConditionTag(log.condition)}
            </div>
          </div>
        `).join('');
      
      render('js-log-list', logHtml);
    }

    function getConditionTag(c) {
      const labels = { good: ['#5aaba0', '😊 良い'], normal: ['#5ab0c8', '😐 普通'], bad: ['#d97270', '😞 悪い'] };
      const [color, text] = labels[c] || labels.good;
      return `<span class="tag" style="color:${color}">${text}</span>`;
    }

    // 起動
    window.onload = init;
  </script>
</body>
</html>
